name: RecipeWizard
options:
  bundleIdPrefix: com.recipewizard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""   # Set your Team ID here after opening in Xcode

targets:
  RecipeWizard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RecipeWizard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recipewizard.app
        INFOPLIST_FILE: RecipeWizard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: RecipeWizard/Resources/RecipeWizard.entitlements
    entitlements:
      path: RecipeWizard/Resources/RecipeWizard.entitlements
    info:
      path: RecipeWizard/Resources/Info.plist
      properties:
        CFBundleDisplayName: RecipeWizard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSPhotoLibraryUsageDescription: "RecipeWizard uses photos to identify recipes."
    dependencies: []

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recipewizard.app.ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: RecipeWizard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    dependencies:
      - embed: false
        target: RecipeWizard
        link: false
